<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KPI Shift Calculator</title>
    <style>
        :root {
            --primary-color: #4f46e5;
            --bg-color: #f1f5f9;
            --card-bg: rgba(255, 255, 255, 0.75);
            --text-main: #0f172a;
            --text-muted: #475569;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #e0e7ff 0%, #f1f5f9 100%);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        @keyframes slideUpFade {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes popNumber {
            0% { transform: scale(1); }
            50% { transform: scale(1.15); }
            100% { transform: scale(1); }
        }

        .animate-pop {
            animation: popNumber 0.3s ease-out;
        }

        .calculator-card {
            background-color: var(--card-bg);
            padding: 2rem;
            border-radius: 16px;
            box-shadow: 0 10px 40px -10px rgba(0,0,0,0.08), 0 1px 3px rgba(0,0,0,0.04);
            width: 100%;
            max-width: 800px;
            animation: slideUpFade 0.6s ease-out forwards;
            border: 1px solid rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
        }

        .header-container {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .store-badge {
            display: inline-block;
            background-color: #f8fafc;
            color: #64748b;
            border: 1px solid #e2e8f0;
            padding: 0.35rem 1rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
            margin-bottom: 1rem;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        h2 {
            margin: 0;
            font-size: 1.75rem;
            font-weight: 800;
            color: var(--text-main);
            letter-spacing: -0.025em;
        }

        .input-group {
            margin-bottom: 0.75rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
        }

        input, select {
            width: 100%;
            padding: 0.5rem 0.75rem;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            font-size: 16px; /* Increased for mobile zoom prevention */
            font-family: inherit;
            height: 40px;
            box-sizing: border-box;
            transition: all 0.2s ease;
            background-color: rgba(248, 250, 252, 0.6);
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
            background-color: rgba(255, 255, 255, 0.9);
        }
        
        input:disabled, select:disabled {
            background-color: #e2e8f0;
            color: #94a3b8;
            cursor: not-allowed;
            border-color: #cbd5e1;
            box-shadow: none;
        }

        .mtd-controls {
            display: flex;
            align-items: stretch;
            flex: 1.2;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            overflow: hidden;
            background-color: rgba(248, 250, 252, 0.6);
            transition: all 0.2s ease;
            height: 40px;
        }
        .mtd-controls:focus-within {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
            background-color: rgba(255, 255, 255, 0.9);
        }
        .mtd-controls input {
            border: none !important;
            border-radius: 0 !important;
            box-shadow: none !important;
            padding: 0 0.25rem !important;
            text-align: center;
            flex: 1;
            width: 100%;
            -moz-appearance: textfield;
            font-weight: 600;
        }
        .mtd-controls input::-webkit-outer-spin-button,
        .mtd-controls input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        .mtd-btn {
            background: rgba(226, 232, 240, 0.6);
            border: none;
            color: #475569;
        padding: 0 0.4rem;
            cursor: pointer;
            font-size: 0.7rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background-color 0.2s ease, color 0.2s ease;
            user-select: none;
            touch-action: manipulation;
        }
        .mtd-btn:hover {
            background: #cbd5e1;
            color: var(--primary-color);
        }
        .mtd-btn:active {
            background: #94a3b8;
        }
        .mtd-controls.disabled {
            background-color: #e2e8f0;
        }
        .mtd-controls.disabled .mtd-btn {
            cursor: not-allowed;
            color: #94a3b8;
        }
        .mtd-controls.disabled .mtd-btn:hover {
            background: #e2e8f0;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.5rem;
        }

        @media (min-width: 768px) {
            .grid-container {
                grid-template-columns: repeat(4, 1fr);
                gap: 0.75rem;
            }
        }

        .grid-container > .input-group {
            background-color: rgba(255, 255, 255, 0.5);
            padding: 0.75rem;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.6);
            margin-bottom: 0;
            box-shadow: 0 1px 2px rgba(0,0,0,0.02);
        }

        .results-section {
            margin-top: 1.5rem;
            border-top: 1px solid #e2e8f0;
            padding-top: 1rem;
        }

        .result-box {
            background: rgba(255, 255, 255, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.6);
            padding: 0.75rem 0.5rem;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.02), 0 2px 4px -1px rgb(0 0 0 / 0.02);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .result-box:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.05);
        }

        .result-value {
            font-size: 1.25rem;
            font-weight: bold;
            color: var(--primary-color);
            margin: 0.15rem 0;
            display: inline-block;
        }

        .result-label {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .btn-reset {
            background-color: #fee2e2;
            color: #ef4444;
            border: none;
            padding: 0.4rem 0.75rem;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 0.75rem;
        }
        .btn-reset:hover {
            background-color: #fca5a5;
        }
        .btn-reset:active {
            transform: scale(0.95);
        }
        
        .progress-container {
            width: 100%;
            height: 6px;
            background-color: #e2e8f0;
            border-radius: 999px;
            margin-top: 0.75rem;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background-color: #059669;
            border-radius: 999px;
            width: 0%;
            transition: width 0.5s ease-out, background-color 0.3s ease;
        }
        
        .calendar-day {
            width: 34px;
            height: 34px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            border: 1px solid rgba(203, 213, 225, 0.6);
            background-color: rgba(255, 255, 255, 0.6);
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            user-select: none;
        }
        .calendar-day.selected {
            background-color: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
            box-shadow: 0 2px 4px rgba(79, 70, 229, 0.3);
        }
        .calendar-day.weekend {
            background-color: #fff1f2;
            border-color: #fecdd3;
            color: #e11d48;
        }
        .calendar-day.weekend.selected {
            background-color: #e11d48;
            border-color: #e11d48;
            color: white;
        }
        
        .calendar-toggle-btn {
            margin: 0;
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            user-select: none;
            padding: 0.4rem 0.75rem;
            background-color: rgba(226, 232, 240, 0.6);
            border-radius: 8px;
            transition: background-color 0.2s ease, color 0.2s ease;
        }
        .calendar-toggle-btn:hover {
            background-color: #cbd5e1;
            color: var(--primary-color);
        }
        
        /* Mobile Compact Adjustments */
        @media (max-width: 600px) {
            body { padding: 8px; }
            .calculator-card { padding: 1rem; border-radius: 16px; }
            h2 { font-size: 1.4rem; }
            .header-container { margin-bottom: 1rem; }
            .grid-container { gap: 0.4rem; }
            .grid-container > .input-group { padding: 0.4rem; }
            .result-box { padding: 0.5rem 0.25rem; }
            .result-value { font-size: 1rem !important; }
            .result-label { font-size: 0.7rem; }
            .schedule-section { padding: 0.75rem !important; margin-bottom: 1rem !important; }
            .calendar-day { width: 30px; height: 30px; font-size: 0.85rem; }
            #calendar-days { gap: 0.3rem !important; }
            .store-badge { padding: 0.25rem 0.75rem; font-size: 0.65rem; margin-bottom: 0.5rem; }
            #advisorImage { width: 36px !important; height: 36px !important; }
            .leaderboard-section { margin-top: 1.5rem !important; padding-top: 1rem !important; }
        }
    </style>
    <!-- Load Chart.js for the Leaderboard -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

    <div class="calculator-card">
        <div id="urlWarning" style="display: none; background-color: #fef2f2; color: #dc2626; padding: 1rem; border-radius: 8px; margin-bottom: 1.5rem; text-align: center; border: 1px solid #fecaca; font-weight: bold; font-size: 0.95rem;">
            ⚠️ READ-ONLY MODE: You are viewing this on GitHub. To save data, please open your Railway app link instead!
        </div>
        <div class="header-container">
            <div class="store-badge">📍 Leicester Gallowtree Gate</div>
            <h2>KPI Target Calculator</h2>
            
            <div style="margin-top: 0.5rem; display: flex; justify-content: center; gap: 0.4rem; flex-wrap: nowrap;">
                <select id="roleSelect" style="width: auto; height: 28px; padding: 0.15rem 0.5rem; border-radius: 999px; border-color: var(--primary-color); font-weight: bold; color: white; background-color: var(--primary-color); cursor: pointer; font-size: 0.75rem; text-align: center; outline: none;">
                    <option value="advisor">👤 Advisor</option>
                    <option value="manager">👑 Manager</option>
                </select>
                <select id="themeSelect" style="width: auto; height: 28px; padding: 0.15rem 0.5rem; border-radius: 999px; border: 1px solid rgba(203, 213, 225, 0.6); font-weight: bold; color: var(--text-muted); background-color: rgba(255, 255, 255, 0.6); cursor: pointer; font-size: 0.75rem; text-align: center; outline: none; box-shadow: 0 1px 2px rgba(0,0,0,0.05);">
                    <option value="blue">🎨 Blue</option>
                    <option value="mint">🎨 Mint</option>
                    <option value="peach">🎨 Peach</option>
                    <option value="purple">🎨 Purple</option>
                    <option value="pink">🎨 Pink</option>
                </select>
            </div>
            
            <div class="input-group" style="max-width: 400px; margin: 1.5rem auto 0 auto; display: flex; align-items: center; gap: 0.5rem; justify-content: center;">
                <img id="advisorImage" src="https://ui-avatars.com/api/?name=Lucy&background=e0e7ff&color=4f46e5&rounded=true" alt="Profile" style="width: 40px; height: 40px; border-radius: 50%; box-shadow: 0 0 0 2px var(--primary-color);">
                <select id="advisorSelect" style="flex: 1; border-color: var(--primary-color); font-weight: bold; color: var(--primary-color); text-align: center; background-color: #e0e7ff; cursor: pointer; font-size: 1.1rem;">
                    <option value="default" disabled selected>👋 Select Advisor...</option>
                    <option value="advisor1">👤 Lucy</option>
                    <option value="advisor2">👤 Luiza</option>
                    <option value="advisor3">👤 Hamza</option>
                    <option value="advisor4">👤 Jibraan</option>
                    <option value="advisor5">👤 Pratiksha</option>
                    <option value="advisor6">👤 Hayley</option>
                    <option value="advisor7">👤 Amirah</option>
                </select>
                <button id="saveBtn" style="background-color: #10b981; color: white; border: none; border-radius: 6px; padding: 0 1rem; height: 40px; cursor: pointer; font-weight: bold; font-size: 1rem; transition: background-color 0.2s;">💾 Save</button>
            </div>
            
            <button id="resetBtn" class="btn-reset">↻ Reset Current Advisor</button>
        </div>
        
        <div id="mainContent" style="display: none;">
            <div class="schedule-section" style="margin-bottom: 1.5rem; background-color: rgba(248, 250, 252, 0.5); padding: 1rem; border-radius: 12px; border: 1px solid rgba(255, 255, 255, 0.6);">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.75rem;">
                    <label id="toggleCalendarBtn" class="calendar-toggle-btn">
                        📅 Working Shifts <span id="calendarIcon" style="font-size: 0.7rem; transition: transform 0.3s ease; display: inline-block; transform: rotate(-90deg);">▼</span>
                    </label>
                    <div class="input-group" style="margin: 0; width: 110px;">
                        <select id="monthSelect" style="height: 34px; padding: 0.25rem 0.5rem;">
                            <option value="1">Jan</option><option value="2">Feb</option><option value="3">Mar</option>
                            <option value="4">Apr</option><option value="5">May</option><option value="6">Jun</option>
                            <option value="7">Jul</option><option value="8">Aug</option><option value="9">Sep</option>
                            <option value="10">Oct</option><option value="11">Nov</option><option value
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="results-section">
            <h3 style="text-align: center; margin-top: 0; margin-bottom: 1rem; color: var(--text-main);">Required vs Current Run Rate</h3>
            <div class="grid-container">
                <div class="result-box"><div style="font-weight: 600; font-size: 0.85rem; margin-bottom: 0.25rem;">POINTS</div><div style="display: flex; justify-content: space-around;"><div><div class="result-value" id="res-POINTS" style="font-size: 1.1rem;">0.00</div><div class="result-label">Per Shift</div></div><div><div class="result-value" id="rr-POINTS" style="font-size: 1.1rem; color: #059669;">0.00%</div><div class="result-label">Run Rate</div></div></div><div class="progress-container"><div class="progress-fill" id="prog-POINTS"></div></div></div>
                <div class="result-box"><div style="font-weight: 600; font-size: 0.85rem; margin-bottom: 0.25rem;">CV</div><div style="display: flex; justify-content: space-around;"><div><div class="result-value" id="res-CV" style="font-size: 1.1rem;">0.00</div><div class="result-label">Per Shift</div></div><div><div class="result-value" id="rr-CV" style="font-size: 1.1rem; color: #059669;">0.00%</div><div class="result-label">Run Rate</div></div></div><div class="progress-container"><div class="progress-fill" id="prog-CV"></div></div></div>
                <div class="result-box"><div style="font-weight: 600; font-size: 0.85rem; margin-bottom: 0.25rem;">HBB</div><div style="display: flex; justify-content: space-around;"><div><div class="result-value" id="res-HBB" style="font-size: 1.1rem;">0.00</div><div class="result-label">Per Shift</div></div><div><div class="result-value" id="rr-HBB" style="font-size: 1.1rem; color: #059669;">0.00%</div><div class="result-label">Run Rate</div></div></div><div class="progress-container"><div class="progress-fill" id="prog-HBB"></div></div></div>
                <div class="result-box"><div style="font-weight: 600; font-size: 0.85rem; margin-bottom: 0.25rem;">MBB</div><div style="display: flex; justify-content: space-around;"><div><div class="result-value" id="res-MBB" style="font-size: 1.1rem;">0.00</div><div class="result-label">Per Shift</div></div><div><div class="result-value" id="rr-MBB" style="font-size: 1.1rem; color: #059669;">0.00%</div><div class="result-label">Run Rate</div></div></div><div class="progress-container"><div class="progress-fill" id="prog-MBB"></div></div></div>
                <div class="result-box"><div style="font-weight: 600; font-size: 0.85rem; margin-bottom: 0.25rem;">RET</div><div style="display: flex; justify-content: space-around;"><div><div class="result-value" id="res-RET" style="font-size: 1.1rem;">0.00</div><div class="result-label">Per Shift</div></div><div><div class="result-value" id="rr-RET" style="font-size: 1.1rem; color: #059669;">0.00%</div><div class="result-label">Run Rate</div></div></div><div class="progress-container"><div class="progress-fill" id="prog-RET"></div></div></div>
                <div class="result-box"><div style="font-weight: 600; font-size: 0.85rem; margin-bottom: 0.25rem;">PAYG</div><div style="display: flex; justify-content: space-around;"><div><div class="result-value" id="res-PAYG" style="font-size: 1.1rem;">0.00</div><div class="result-label">Per Shift</div></div><div><div class="result-value" id="rr-PAYG" style="font-size: 1.1rem; color: #059669;">0.00%</div><div class="result-label">Run Rate</div></div></div><div class="progress-container"><div class="progress-fill" id="prog-PAYG"></div></div></div>
                <div class="result-box"><div style="font-weight: 600; font-size: 0.85rem; margin-bottom: 0.25rem;">B2B</div><div style="display: flex; justify-content: space-around;"><div><div class="result-value" id="res-B2B" style="font-size: 1.1rem;">0.00</div><div class="result-label">Per Shift</div></div><div><div class="result-value" id="rr-B2B" style="font-size: 1.1rem; color: #059669;">0.00%</div><div class="result-label">Run Rate</div></div></div><div class="progress-container"><div class="progress-fill" id="prog-B2B"></div></div></div>
                <div class="result-box"><div style="font-weight: 600; font-size: 0.85rem; margin-bottom: 0.25rem;">ACCESSORIES</div><div style="display: flex; justify-content: space-around;"><div><div class="result-value" id="res-ACCESSORIES" style="font-size: 1.1rem;">0.00</div><div class="result-label">Per Shift</div></div><div><div class="result-value" id="rr-ACCESSORIES" style="font-size: 1.1rem; color: #059669;">0.00%</div><div class="result-label">Run Rate</div></div></div><div class="progress-container"><div class="progress-fill" id="prog-ACCESSORIES"></div></div></div>
            </div>
        </div>

        <div class="leaderboard-section" style="margin-top: 2rem; border-top: 1px solid #e2e8f0; padding-top: 1.5rem;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                <h3 style="margin: 0; color: var(--text-main);">🏆 Team Leaderboard (Run Rate %)</h3>
                <select id="leaderboardKpiSelect" style="width: auto; height: 34px; padding: 0.25rem 0.5rem; font-weight: bold; color: var(--primary-color);">
                    <option value="POINTS">POINTS</option>
                    <option value="CV">CV</option>
                    <option value="HBB">HBB</option>
                    <option value="MBB">MBB</option>
                    <option value="RET">RET</option>
                    <option value="PAYG">PAYG</option>
                    <option value="B2B">B2B</option>
                    <option value="ACCESSORIES">ACCESSORIES</option>
                </select>
            </div>
            <div style="position: relative; height: 250px; width: 100%;">
                <canvas id="leaderboardChart"></canvas>
            </div>
        </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const advisorSelect = document.getElementById('advisorSelect');
            const monthSelect = document.getElementById('monthSelect');
            const kpiTargets = document.querySelectorAll('.kpi-target');
            const kpiMtds = document.querySelectorAll('.kpi-mtd');
            
            const advisorImage = document.getElementById('advisorImage');
            
            // To use custom photos, paste the direct image link (ending in .jpg or .png) between the quotes!
            const advisorImages = {
                "default": "https://ui-avatars.com/api/?name=👋&background=e0e7ff&color=4f46e5&rounded=true",
                "advisor1": "https://ui-avatars.com/api/?name=LW&background=e0e7ff&color=4f46e5&rounded=true",      // <-- Replace this link for Lucy
                "advisor2": "https://ui-avatars.com/api/?name=LV&background=e0e7ff&color=4f46e5&rounded=true",     // <-- Replace this link for Luiza
                "advisor3": "https://ui-avatars.com/api/?name=HA&background=e0e7ff&color=4f46e5&rounded=true",     // <-- Replace this link for Hamza
                "advisor4": "https://ui-avatars.com/api/?name=JO&background=e0e7ff&color=4f46e5&rounded=true",   // <-- Replace this link for Jibraan
                "advisor5": "https://ui-avatars.com/api/?name=PV&background=e0e7ff&color=4f46e5&rounded=true", // <-- Replace this link for Pratiksha
                "advisor6": "https://ui-avatars.com/api/?name=HE&background=e0e7ff&color=4f46e5&rounded=true",    // <-- Replace this link for Hayley
                "advisor7": "https://ui-avatars.com/api/?name=AB&background=e0e7ff&color=4f46e5&rounded=true"     // <-- Replace this link for Amirah
            };
            
            const themes = {
                "blue": "linear-gradient(135deg, #e0e7ff 0%, #f1f5f9 100%)",
                "mint": "linear-gradient(135deg, #d1fae5 0%, #f0fdf4 100%)",
                "peach": "linear-gradient(135deg, #ffedd5 0%, #fff7ed 100%)",
                "purple": "linear-gradient(135deg, #f3e8ff 0%, #f8fafc 100%)",
                "pink": "linear-gradient(135deg, #fce7f3 0%, #fff1f2 100%)"
            };

            let allAdvisorsData = {}; // Will hold data for all 7 advisors
            let currentSchedules = {}; // Object to store scheduled days by month, e.g. { "4": [6,7,8,10] }
            let leaderboardChart = null; // Global variable to hold our Chart.js instance

            const roleSelect = document.getElementById('roleSelect');
            const MANAGER_PIN = "1203"; // You can change this PIN to whatever you want!

            function applyRolePermissions() {
                const isManager = roleSelect.value === 'manager';
                const isDefault = advisorSelect.value === 'default';
                
                kpiTargets.forEach(input => input.disabled = !isManager || isDefault);
                kpiMtds.forEach(input => {
                    input.disabled = isManager || isDefault;
                    const ctrl = document.getElementById(`mtd-ctrl-${input.getAttribute('data-kpi')}`);
                    if(ctrl) {
                        if(isManager || isDefault) ctrl.classList.add('disabled');
                        else ctrl.classList.remove('disabled');
                    }
                });
                document.getElementById('monthSelect').disabled = !isManager || isDefault;
                document.getElementById('resetBtn').style.display = (isManager && !isDefault) ? 'inline-block' : 'none';

                const saveBtn = document.getElementById('saveBtn');
                saveBtn.disabled = isDefault;
                saveBtn.style.opacity = isDefault ? '0.5' : '1';
                saveBtn.style.cursor = isDefault ? 'not-allowed' : 'pointer';

                document.getElementById('dashboardContent').style.display = isDefault ? 'none' : 'block';
                document.getElementById('welcomeMessage').style.display = isDefault ? 'block' : 'none';
            }

            roleSelect.addEventListener('change', () => {
                if (roleSelect.value === 'manager') {
                    const pin = prompt("Enter Manager PIN to unlock Target settings:");
                    if (pin !== MANAGER_PIN) {
                        alert("❌ Incorrect PIN.");
                        roleSelect.value = 'advisor';
                    }
                }
                applyRolePermissions();
                renderCalendar(); // Refresh calendar to lock/unlock clickable days
            });

            // Check if user is on GitHub Pages or a local file instead of Railway
            const currentUrl = window.location.href;
            if (currentUrl.includes('github.io') || currentUrl.startsWith('file://')) {
                document.getElementById('urlWarning').style.display = 'block';
            }

            // Load data from the Node.js Server (Railway)
            async function fetchCloudData() {
                try {
                    // Add a timestamp to completely bypass mobile browser caching
                    const response = await fetch(`/api/data?t=${new Date().getTime()}`, { cache: 'no-store' });
                    if (response.ok) {
                        allAdvisorsData = await response.json();
                    }
                } catch (error) {
                    console.error("Failed to fetch data:", error);
                } finally {
                    const lastAdvisor = localStorage.getItem('lastSavedAdvisor');
                    if (lastAdvisor && document.querySelector(`#advisorSelect option[value="${lastAdvisor}"]`)) {
                        advisorSelect.value = lastAdvisor;
                    } else {
                        advisorSelect.value = 'default';
                    }
                    
                    // Initialize the UI only AFTER attempting to fetch cloud data
                    loadAdvisorData(advisorSelect.value);
                    advisorImage.src = advisorImages[advisorSelect.value]; // Ensure image matches dropdown on load
                    applyRolePermissions(); // Lock the UI based on the current role
                }
            }
            fetchCloudData();

            function saveToCloud() {
                const saveBtn = document.getElementById('saveBtn');
                saveBtn.textContent = '⏳ Saving...';
                saveBtn.style.backgroundColor = '#f59e0b';
                
                fetch('/api/data', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(allAdvisorsData)
                }).then(async (res) => {
                    if (res.ok) {
                        saveBtn.textContent = '✅ Saved!';
                        saveBtn.style.backgroundColor = '#059669';
                        setTimeout(() => {
                            saveBtn.textContent = '💾 Save';
                            saveBtn.style.backgroundColor = '#10b981';
                        }, 2000);
                    } else {
                        // Get the raw HTTP Status and exact text from Railway
                        const text = await res.text();
                        let errorMessage = `HTTP Error ${res.status}: `;
                        try {
                            const errData = JSON.parse(text);
                            errorMessage += errData.error || "Server rejected the save request";
                        } catch(e) {
                            errorMessage += text ? text.substring(0, 150) : "Server rejected the save request (No response body)";
                        }
                        throw new Error(errorMessage);
                    }
                }).catch(err => {
                    console.error("Failed to save data:", err);
                    saveBtn.textContent = '❌ Error';
                    saveBtn.style.backgroundColor = '#ef4444';
                    setTimeout(() => {
                        saveBtn.textContent = '💾 Save';
                        saveBtn.style.backgroundColor = '#10b981';
                    }, 3000);
                    
                    // Show an alert so the user knows exactly why it failed
                    alert("Save failed! The server says:\n\n" + err.message + "\n\nPlease let your developer know this exact message!");
                });
            }
            
            document.getElementById('saveBtn').addEventListener('click', saveToCloud);

            // Function to load a specific advisor's profile into the UI
            function loadAdvisorData(advisorId) {
                const data = allAdvisorsData[advisorId] || {};
                
                monthSelect.value = data.monthSelect || (new Date().getMonth() + 1);
                currentSchedules = data.schedules ? JSON.parse(JSON.stringify(data.schedules)) : {}; // Deep copy to prevent bugs

                kpiTargets.forEach(input => {
                    const kpi = input.getAttribute('data-kpi');
                    input.value = data[`target_${kpi}`] !== undefined ? data[`target_${kpi}`] : '';
                });
                kpiMtds.forEach(input => {
                    const kpi = input.getAttribute('data-kpi');
                    input.value = data[`mtd_${kpi}`] !== undefined ? data[`mtd_${kpi}`] : '';
                });

                const savedTheme = data.theme || "blue";
                document.getElementById('themeSelect').value = savedTheme;
                document.body.style.background = themes[savedTheme];

                renderCalendar();
                calculateTargets();
            }

            // Render the calendar interface dynamically based on the selected month
            function renderCalendar() {
                const month = parseInt(monthSelect.value, 10);
                const year = new Date().getFullYear();
                const daysInMonth = new Date(year, month, 0).getDate();
                const container = document.getElementById('calendar-days');
                
                container.innerHTML = ''; // Clear previous days
                const monthStr = month.toString();
                
                if (!currentSchedules[monthStr]) {
                    currentSchedules[monthStr] = [];
                }
                const scheduledDays = currentSchedules[monthStr];

                for (let i = 1; i <= daysInMonth; i++) {
                    const dayDiv = document.createElement('div');
                    dayDiv.className = 'calendar-day';
                    dayDiv.textContent = i;

                    const dateObj = new Date(year, month - 1, i);
                    const dayOfWeek = dateObj.getDay();
                    if (dayOfWeek === 0 || dayOfWeek === 6) {
                        dayDiv.classList.add('weekend');
                    }
                    
                    if (scheduledDays.includes(i)) {
                        dayDiv.classList.add('selected');
                    }
                    
                    if (document.getElementById('roleSelect').value === 'manager') {
                        dayDiv.addEventListener('click', () => {
                            const idx = scheduledDays.indexOf(i);
                            if (idx > -1) {
                                scheduledDays.splice(idx, 1); // Unselect
                                dayDiv.classList.remove('selected');
                            } else {
                                scheduledDays.push(i); // Select
                                dayDiv.classList.add('selected');
                            }
                            calculateTargets(); // Re-calculate everything automatically
                        });
                    } else {
                        dayDiv.style.cursor = 'not-allowed';
                        dayDiv.style.opacity = '0.7';
                    }
                    
                    container.appendChild(dayDiv);
                }
            }

            function calculateTargets() {
                const currentAdvisor = advisorSelect.value;
                const currentYear = new Date().getFullYear();
                const month = parseInt(monthSelect.value, 10);
                const daysInMonth = new Date(currentYear, month, 0).getDate();
                
                // Calculate Passed vs Remaining dynamically
                const scheduledDays = currentSchedules[month.toString()] || [];
                let passed = 0;
                let remaining = 0;
                
                const todayDate = new Date();
                todayDate.setHours(0,0,0,0); // Normalize to start of day

                scheduledDays.forEach(day => {
                    const dayDate = new Date(currentYear, month - 1, day);
                    dayDate.setHours(0,0,0,0);
                    if (dayDate < todayDate) passed++;
                    else remaining++;
                });

                // Update the visual badges
                document.getElementById('calcDaysPassed').textContent = passed;
                document.getElementById('calcRemaining').textContent = remaining;

                // Save this specific advisor's inputs to our data object
                const advisorData = {
                    monthSelect: monthSelect.value,
                    schedules: currentSchedules,
                    theme: document.getElementById('themeSelect').value
                };

                kpiTargets.forEach(targetInput => {
                    const kpiName = targetInput.getAttribute('data-kpi');
                    const mtdInput = document.querySelector(`.kpi-mtd[data-kpi="${kpiName}"]`);
                    const resDisplay = document.getElementById(`res-${kpiName}`);
                    const rrDisplay = document.getElementById(`rr-${kpiName}`);
                    const progDisplay = document.getElementById(`prog-${kpiName}`);
                    
                    const target = parseFloat(targetInput.value);
                    const mtd = parseFloat(mtdInput.value) || 0;

                    // Add this KPI's data to our save file
                    advisorData[`target_${kpiName}`] = targetInput.value;
                    advisorData[`mtd_${kpiName}`] = mtdInput.value;

                    // Calculate required per remaining shift
                    let newResText = '0';
                    if (!isNaN(target) && !isNaN(remaining) && remaining > 0) {
                        const remainingToHit = Math.max(0, target - mtd);
                        newResText = Math.ceil(remainingToHit / remaining).toString();
                    }

                    if (resDisplay.textContent !== newResText) {
                        resDisplay.textContent = newResText;
                        resDisplay.classList.remove('animate-pop');
                        void resDisplay.offsetWidth; // Trigger DOM reflow to restart animation
                        resDisplay.classList.add('animate-pop');
                    }

                    // Calculate actual current run rate percentage
                    let newRrText = '0.00%';
                    let newRrColor = '#059669'; // default green
                    let newRrBg = 'transparent';

                    let isCurrentlyOnTrack = false;

                    if (!isNaN(mtd) && passed > 0 && !isNaN(target) && target > 0 && !isNaN(daysInMonth) && daysInMonth > 0) {
                        const projectedTotal = (mtd / passed) * daysInMonth;
                        const runRatePercent = (projectedTotal / target) * 100;
                        newRrText = runRatePercent.toFixed(2) + '%';
                        
                        if (runRatePercent < 100) {
                            newRrColor = '#ef4444';
                            newRrBg = '#fef2f2';
                        } else {
                            newRrBg = '#ecfdf5';
                            isCurrentlyOnTrack = true;
                        }
                    }

                    rrDisplay.style.borderRadius = '6px';
                    rrDisplay.style.padding = '0.1rem 0.4rem';
                    rrDisplay.style.display = 'inline-block';

                    if (rrDisplay.textContent !== newRrText) {
                        rrDisplay.textContent = newRrText;
                        rrDisplay.style.color = newRrColor;
                        rrDisplay.style.backgroundColor = newRrBg;
                        
                        rrDisplay.classList.remove('animate-pop');
                        void rrDisplay.offsetWidth; // Trigger DOM reflow to restart animation
                        rrDisplay.classList.add('animate-pop');
                    }

                    // Update progress bar
                    if (progDisplay) {
                        let progressPercent = 0;
                        if (!isNaN(target) && target > 0 && !isNaN(mtd)) {
                            progressPercent = (mtd / target) * 100;
                            // Cap visual width at 100% so it doesn't overflow the container
                            if (progressPercent > 100) progressPercent = 100;
                        }
                        progDisplay.style.width = `${progressPercent}%`;
                        progDisplay.style.backgroundColor = newRrColor; // Match the bar color to the run-rate status (Red/Green)
                    }
                });

                if (currentAdvisor !== 'default') {
                    // Update the global data object with this advisor's new numbers
                    allAdvisorsData[currentAdvisor] = advisorData;
                }
                
                // Automatically refresh the leaderboard chart
                updateLeaderboard();
            }

            function updateLeaderboard() {
                const kpi = document.getElementById('leaderboardKpiSelect').value;
                const currentYear = new Date().getFullYear();
                
                const baseAdvisors = [
                    { name: "Lucy", key: "advisor1" },
                    { name: "Luiza", key: "advisor2" },
                    { name: "Hamza", key: "advisor3" },
                    { name: "Jibraan", key: "advisor4" },
                    { name: "Pratiksha", key: "advisor5" },
                    { name: "Hayley", key: "advisor6" },
                    { name: "Amirah", key: "advisor7" }
                ];

                // Calculate the score for everyone
                const chartData = baseAdvisors.map(adv => {
                    const advData = allAdvisorsData[adv.key];
                    let score = 0;
                    if (!advData) return { name: adv.name, score: 0 };
                    
                    
                    const target = parseFloat(advData[`target_${kpi}`]) || 0;
                    const mtd = parseFloat(advData[`mtd_${kpi}`]) || 0;
                    
                    const month = parseInt(advData.monthSelect || document.getElementById('monthSelect').value, 10);
                    const daysInMonth = new Date(currentYear, month, 0).getDate();
                    const scheduledDays = (advData.schedules && advData.schedules[month.toString()]) ? advData.schedules[month.toString()] : [];
                    
                    let passed = 0;
                    const todayDate = new Date();
                    todayDate.setHours(0,0,0,0);

                    scheduledDays.forEach(day => {
                        const dayDate = new Date(currentYear, month - 1, day);
                        dayDate.setHours(0,0,0,0);
                        if (dayDate < todayDate) passed++;
                    });

                    if (mtd > 0 && passed > 0 && target > 0 && daysInMonth > 0) {
                        const projectedTotal = (mtd / passed) * daysInMonth;
                        score = parseFloat(((projectedTotal / target) * 100).toFixed(2));
                    }
                    return { name: adv.name, score: score };
                });

                // Sort the leaderboard from highest Run Rate to lowest
                chartData.sort((a, b) => b.score - a.score);
                
                const labels = chartData.map(d => d.name);
                const dataPoints = chartData.map(d => d.score);
                const bgColors = dataPoints.map(val => val >= 100 ? '#10b981' : '#ef4444');
                const targetLineData = dataPoints.map(() => 100); // Create a flat line at 100

                if (leaderboardChart) {
                    leaderboardChart.data.labels = labels;
                    leaderboardChart.data.datasets[0].data = dataPoints;
                    leaderboardChart.data.datasets[0].backgroundColor = bgColors;
                    if (leaderboardChart.data.datasets[1]) {
                        leaderboardChart.data.datasets[1].data = targetLineData;
                    }
                    leaderboardChart.update();
                } else {
                    const ctx = document.getElementById('leaderboardChart').getContext('2d');
                    leaderboardChart = new Chart(ctx, {
                        data: {
                            labels: labels,
                            datasets: [
                                {
                                    type: 'bar',
                                    label: 'Run Rate %',
                                    data: dataPoints,
                                    backgroundColor: bgColors,
                                    borderRadius: 6,
                                    order: 2
                                },
                                {
                                    type: 'line',
                                    label: '100% Target',
                                    data: targetLineData,
                                    borderColor: '#94a3b8',
                                    borderWidth: 2,
                                    borderDash: [5, 5],
                                    fill: false,
                                    pointRadius: 0,
                                    pointHoverRadius: 0,
                                    order: 1
                                }
                            ]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            plugins: { 
                                legend: { display: false },
                                tooltip: {
                                    callbacks: {
                                        label: function(context) {
                                            return context.parsed.y + '%';
                                        }
                                    }
                                }
                            },
                            scales: {
                                y: {
                                    beginAtZero: true,
                                    title: {
                                        display: true,
                                        text: 'Run Rate %'
                                    }
                                }
                            }
                        }
                    });
                }
            }

            advisorSelect.addEventListener('change', () => {
                localStorage.setItem('lastSavedAdvisor', advisorSelect.value);
                advisorImage.src = advisorImages[advisorSelect.value];
                loadAdvisorData(advisorSelect.value);
                applyRolePermissions();
            });
            monthSelect.addEventListener('change', () => {
                renderCalendar();
                calculateTargets();
            });
            document.getElementById('themeSelect').addEventListener('change', () => {
                document.body.style.background = themes[document.getElementById('themeSelect').value];
                calculateTargets();
            });
            kpiTargets.forEach(input => input.addEventListener('input', calculateTargets));
            kpiMtds.forEach(input => input.addEventListener('input', calculateTargets));

            // Listener for the custom MTD stepper buttons
            document.querySelectorAll('.mtd-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    if (roleSelect.value === 'manager') return; // Disabled in manager mode
                    
                    const kpi = e.target.getAttribute('data-kpi');
                    const input = document.querySelector(`.kpi-mtd[data-kpi="${kpi}"]`);
                    
                    let val = parseFloat(input.value) || 0;
                    if (e.target.classList.contains('up')) val += 1;
                    else if (e.target.classList.contains('down')) val = Math.max(0, val - 1);
                    
                    input.value = val;
                    calculateTargets();
                });
            });

            document.getElementById('leaderboardKpiSelect').addEventListener('change', () => {
                updateLeaderboard();
            });

            // Logic for the Reset Data Button
            document.getElementById('resetBtn').addEventListener('click', () => {
                const advisorName = advisorSelect.options[advisorSelect.selectedIndex].text;
                if(confirm(`Are you sure you want to clear all numbers for ${advisorName}?`)) {
                    delete allAdvisorsData[advisorSelect.value];
                    
                    saveToCloud();
                    
                    loadAdvisorData(advisorSelect.value);
                }
            });

            // Collapsible Calendar Logic
            const toggleBtn = document.getElementById('toggleCalendarBtn');
            const collapseArea = document.getElementById('calendarCollapse');
            const calIcon = document.getElementById('calendarIcon');
            
            toggleBtn.addEventListener('click', () => {
                if (collapseArea.style.display === 'none') {
                    collapseArea.style.display = 'block';
                    calIcon.style.transform = 'rotate(0deg)';
                } else {
                    collapseArea.style.display = 'none';
                    calIcon.style.transform = 'rotate(-90deg)';
                }
            });

            // Collapsible KPI Input Logic
            const toggleKpiBtn = document.getElementById('toggleKpiBtn');
            const kpiCollapseArea = document.getElementById('kpiCollapse');
            const kpiIcon = document.getElementById('kpiIcon');
            
            toggleKpiBtn.addEventListener('click', () => {
                if (kpiCollapseArea.style.display === 'none') {
                    kpiCollapseArea.style.display = 'block';
                    kpiIcon.style.transform = 'rotate(0deg)';
                } else {
                    kpiCollapseArea.style.display = 'none';
                    kpiIcon.style.transform = 'rotate(-90deg)';
                }
            });
        });
    </script>
</body>
</html>
